app:
  description: "**AI 简历初筛与岗位匹配助手**\n\n让 HR 上传简历、填写岗位要求后，系统自动：\n\n1. 提取候选人的基础信息、技能、项目、年限等内容\
    \  \n2. 根据岗位 JD 给出匹配度和匹配理由  \n3. 标记风险项或待人工确认项  \n4. 输出结构化结果，便于进入 Excel / 飞书多维表格\
    \  \n5. 生成人工复核建议，避免“AI 自动拒人”的风险  "
