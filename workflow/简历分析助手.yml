    - data:
        code: "import json\nimport re\n\n\ndef _extract_json(text: str) -> str:\n\
          \    \"\"\"兼容模型偶发返回的 Markdown 围栏或前后说明文字。\"\"\"\n    cleaned = (text or \"\
          \").strip()\n    cleaned = re.sub(r\"^```(?:json)?\\\\s*|\\\\s*```$\", \"\
          \", cleaned, flags=re.IGNORECASE)\n    start, end = cleaned.find(\"{\"),\
          \ cleaned.rfind(\"}\")\n    return cleaned[start : end + 1] if start >=\
          \ 0 and end > start else cleaned\n\n\ndef main(llm_output: str) -> dict:\n\
          \    raw_output = llm_output or \"\"\n    try:\n        parsed = json.loads(_extract_json(raw_output))\n\
          \        return {\n            \"parsed_json\": json.dumps(parsed, ensure_ascii=False),\n\
          \            \"parse_status\": \"success\",\n            \"raw_output\"\
          : raw_output,\n        }\n    except (json.JSONDecodeError, TypeError, ValueError)\
          \ as exc:\n        fallback = {\n            \"error\": \"parse_failed\"\
          ,\n            \"message\": \"模型输出不是合法 JSON；请人工复核 raw_output。\",\n     \
          \   }\n        return {\n            \"parsed_json\": json.dumps(fallback,\
          \ ensure_ascii=False),\n            \"parse_status\": f\"failed: {type(exc).__name__}\"\
          ,\n            \"raw_output\": raw_output,\n        }\n"
